<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">

  <!-- Zoho SDK -->
  <script src="https://live.zwidgets.com/js-sdk/1.5/ZohoEmbededAppSDK.min.js"></script>

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="style/style.css">
</head>

<body>
  <div id="app" ng-controller="homeController">

    <div class="widget-container" ng-if="!CancelFormHideMsg">
      <div class="container">

        <h5 class="mb-3">Reason For Delay</h5>

        <div class="row g-3">

          <!-- <div class="col-md-6">
            <label class="form-label">Reason For Delay Name *</label>
            <input type="text" class="form-control" ng-model="form.delayName"
              ng-class="{'error-border': errors.delayName}">
          </div> -->

          <div class="col-md-4">
            <label class="form-label">Job Card ID </label>
            <input type="text" class="form-control" ng-model="form.jobCardName" readonly>
          </div>

          <div class="col-md-4">
            <label class="form-label">VIN Number</label>
            <input type="text" class="form-control" ng-model="form.vin" readonly>
          </div>

          <div class="col-md-4">
            <label class="form-label">Vehicle Registration Number</label>
            <input type="text" class="form-control" ng-model="form.rcno" readonly>
          </div>

          <div class="col-md-4">
            <label class="form-label">Customer</label>
            <input type="text" class="form-control" ng-model="form.customer" readonly>
          </div>

          <div class="col-md-4">
            <label class="form-label">Service Technician Name</label>
            <input type="text" class="form-control" ng-model="form.serviceTechname" readonly>
          </div>

          <div class="col-md-4">
            <label class="form-label">JC Owner Name</label>
            <input type="text" class="form-control" ng-model="form.ownername" readonly>
          </div>

          <div class="col-md-4">
            <label class="form-label">Check In Day <span class="star">*</span></label>
            <input type="datetime-local" class="form-control" ng-model="form.checkInDay" ng-change="calculateDays()"
              ng-class="{'error-border': errors.checkInDay}" readonly>
          </div>

          <div class="col-md-4">
            <label class="form-label">Gate Pass Day <span class="star">*</span></label>
            <input type="datetime-local" class="form-control" ng-model="form.gatePassDay" ng-change="calculateDays()" ng-class="{'error-border': errors.gatePassDay}" readonly>
          </div>

          <div class="col-md-4">
            <label class="form-label">Delayed Hours</label>
            <input type="number" class="form-control" ng-model="form.delayedHours" readonly>
          </div>

        </div>


        <hr class="mt-4">


        <h6>Delay Reasons</h6>

        <table class="table table-bordered">

          <thead class="table-light">
            <tr>
              <th style="width:25%">Delay Reason <span class="star">*</span></th>
              <th style="width:15%">Delay Hours <span class="star">*</span></th>
              <th>Summary of delay <span class="star">*</span></th>
              <th style="width:80px"></th>
            </tr>
          </thead>

          <tbody>

            <tr ng-repeat="row in delayRows track by $index">

              <td>
                <select class="form-select" ng-model="row.reason" ng-options="r for r in getAvailableReasons($index)"
                  ng-class="{'error-border': row.reasonError}">

                  <option value="">-None-</option>

                </select>
              </td>

              <td>
                <input type="number" class="form-control" ng-model="row.hours" ng-change="updateTotal()" min="0"
                  oninput="if(this.value < 0) this.value = 0" ng-class="{'error-border': row.hoursError}">
              </td>

              <td>
                <textarea class="form-control" ng-model="row.description" style="height: 2rem;"
                  ng-class="{'error-border': row.descriptionError}"></textarea>
              </td>

              <td class="text-center">

                <button class="btn btn-danger btn-sm" ng-click="deleteRow($index)" ng-if="delayRows.length > 1">

                  <i class="bi bi-trash"></i>

                </button>

              </td>

            </tr>

          </tbody>

        </table>
        <div class="row align-items-end mt-3">
          <div class="col-md-4">
            <button class="btn btn-outline-primary" ng-click="addRow()" ng-disabled="isAddRowDisabled()">
              <i class="bi bi-plus"></i> Add Row
            </button>
          </div>
          <div class="col-md-4 ms-auto">
            <label class="form-label">Reason captured for delayed hours</label>
            <input type="number" class="form-control" ng-model="totalDays" readonly
              ng-class="{'error-border': errors.totalDays}">
          </div>
          <div class="col-md-2">
            <button class="btn btn-success w-100" ng-click="submitForm()" ng-disabled="!isSubmitEnabled()">
              Submit
            </button>
          </div>
        </div>
      </div>
    </div>
    <div ng-if="CancelFormHideMsg" class="text-success" style="text-align: center;padding: 24% 10px;font-size: 25px;">
      {{CancelFormHideMsg}}
    </div>

    <!-- Page Loader -->
    <div class="page-loader" ng-if="isLoading">
      <div class="loader-content text-center">
        <!-- Spinner -->
        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
          <span class="visually-hidden">Loading...</span>
        </div>
        <!-- Loading Text -->
        <div class="loader-text mt-3">
          Should not close the tab please wait...
        </div>
      </div>
    </div>


    <!-- COMMON TOAST -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
      <div id="commonToast" class="toast align-items-center border-0" role="alert" aria-live="assertive"
        aria-atomic="true" ng-style="{
         'background-color': toastBgColor,
         'color': toastTextColor
     }">
        <div class="d-flex">
          <div class="toast-body">
            {{toastMessage}}
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast">
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/homecontroller.js"></script>
</body>

</html>
